<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
#filter-panel {
            position: absolute; top: 70px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border: 1px solid #ccc;
            border-radius: 5px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-family: Arial, sans-serif;
            width: 300px;
        }
        #filter-panel h4 { margin: 0 0 10px 0; font-size: 16px; }
        #filter-panel strong { display: block; margin-bottom: 5px; }
        #filter-panel label { display: block; margin: 3px 0; font-size: 14px; }
        .input-search {
            width: 100%; padding: 6px; margin-top: 5px; box-sizing: border-box;
        }
        .button-group {
            display: flex; gap: 10px; margin-top: 15px;
        }
        .button-group button {
            flex: 1; padding: 8px 12px; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px; color: white;
        }
        #reset-btn { background: #28a745; }
        #reset-btn:hover { background: #218838; }
        #clear-btn { background: #dc3545; }
        #clear-btn:hover { background: #c82333; }
        /* 隱藏/開啟按鈕樣式 */
        #toggle-filter-btn {
            position: absolute; top: 70px; left: 10px; z-index: 1100;
            padding: 8px 12px; background: #007bff; color: white;
            border: none; border-radius: 4px; cursor: pointer;
            font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        #toggle-filter-btn:hover { background: #0056b3; }
        </style>
        <title>歷代古建築地圖</title>

    </head>
    <body>
        <!-- 隱藏/開啟篩選的浮動按鈕 -->
        <button id="toggle-filter-btn">隱藏篩選</button>

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <!-- 篩選面板 -->
        <div id="filter-panel">
            <h4>篩選條件</h4>

            <!-- 國家 -->
            <div style="margin-bottom:15px;">
                <strong>國家</strong><br>
                <label><input type="checkbox" class="filter-country" value="CN" checked> CN (中國)</label>
                <label><input type="checkbox" class="filter-country" value="JP" checked> JP (日本)</label>
                <label><input type="checkbox" class="filter-country" value="KR" checked> KR (韓國)</label>
                <label><input type="checkbox" class="filter-country" value="KP" checked> KP (朝鮮)</label>
                <label><input type="checkbox" class="filter-country" value="VN" checked> VN (越南)</label>
                <label><input type="checkbox" class="filter-country" value="TW" checked> TW (台灣)</label>
                <label><input type="checkbox" class="filter-country" value="NR" checked> NR (挪威)</label>
                <label><input type="checkbox" class="filter-country" value="GB" checked> GB (英國)</label>
                <label><input type="checkbox" class="filter-country" value="DN" checked> DN (丹麥)</label>
                <label><input type="checkbox" class="filter-country" value="MN" checked> MN (蒙古)</label>
                <label><input type="checkbox" class="filter-country" value="RU" checked> RU (俄羅斯)</label>
                <label><input type="checkbox" class="filter-country" value="TR" checked> TR (土耳其)</label>
           
		<!-- 新增：國家專屬消除按鈕 -->
   			<button id="clear-country-btn" onclick="window.clearCountryFilters()" style="margin-top:8px;
								padding:6px 12px; background:#dc3545; 
								color:white; border:none; 
								border-radius:4px; 
								cursor:pointer; 
								font-size:13px; 
								width:100%;">
        		國家 - 消除所有點選
    	        	</button>

 		</div>

            <!-- 世紀輸入搜尋（數字篩選） -->
            <div style="margin-bottom:15px;">
                <strong>世紀</strong>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <select id="year-operator" style="padding:6px; font-size:14px;">
                        <option value="=">等於 (=)</option>
                        <option value=">">大於 (>)</option>
                        <option value="<">小於 (<)</option>
                        <option value="-">範圍 (-)</option>
                    </select>
                    <input type="text" id="year-search" placeholder="例如：7 或 7.5" class="input-search" style="flex:1;">
                </div>
            </div>

            <!-- 時代（輸入搜尋） -->
            <div style="margin-bottom:15px;">
                <strong>時代</strong>
                <input type="text" id="period-search" placeholder="例如：大明、江戶、高麗" class="input-search">
            </div>

            <!-- 名稱（輸入搜尋） -->
            <div style="margin-bottom:15px;">
                <strong>名稱</strong>
                <input type="text" id="name-search" placeholder="例如：佛光寺、醍醐寺" class="input-search">
            </div>

            <!-- 地址（輸入搜尋） -->
            <div style="margin-bottom:15px;">
                <strong>地址</strong>
                <input type="text" id="address-search" placeholder="例如：西安、京都" class="input-search">
            </div>

            <!-- 地區（輸入搜尋） -->
            <div style="margin-bottom:15px;">
                <strong>地區</strong>
                <input type="text" id="region-search" placeholder="例如：東北、關東" class="input-search">
            </div>

	    <!-- 類型輸入搜尋（雙條件 + AND/OR） -->
            <div style="margin-bottom:15px;">
                <strong>類型</strong>
                <div style="display:flex; gap:5px; margin-top:8px; align-items:center;">
                    <select id="genre-logic" style="padding:6px; font-size:14px; width:60px;">
                        <option value="AND">AND</option>
                        <option value="OR">OR</option>
                    </select>
                    <select id="genre1-operator" style="padding:6px; font-size:14px; width:85px;">
                        <option value="contains">包含</option>
                        <option value="not_contains">不包含</option>
                    </select>
                    <input type="text" id="genre1-search" placeholder="例如：孔廟" class="input-search" style="flex:1;">
                </div>
                <div style="display:flex; gap:5px; margin-top:8px; align-items:center;">
                    <select id="genre2-operator" style="padding:6px; font-size:14px; width:85px;">
                        <option value="contains">包含</option>
                        <option value="not_contains">不包含</option>
                    </select>
                    <input type="text" id="genre2-search" placeholder="例如：主殿" class="input-search" style="flex:1;">
                </div>
            </div>

            <!-- 功能輸入搜尋（雙條件 + AND/OR） -->
            <div style="margin-bottom:15px;">
                <strong>功能</strong>
                <div style="display:flex; gap:5px; margin-top:8px; align-items:center;">
                    <select id="function-logic" style="padding:6px; font-size:14px; width:60px;">
                        <option value="AND">AND</option>
                        <option value="OR">OR</option>
                    </select>
                    <select id="function1-operator" style="padding:6px; font-size:14px; width:85px;">
                        <option value="contains">包含</option>
                        <option value="not_contains">不包含</option>
                    </select>
                    <input type="text" id="function1-search" placeholder="例如：主殿" class="input-search" style="flex:1;">
                </div>
                <div style="display:flex; gap:5px; margin-top:8px; align-items:center;">
                    <select id="function2-operator" style="padding:6px; font-size:14px; width:85px;">
                        <option value="contains">包含</option>
                        <option value="not_contains">不包含</option>
                    </select>
                    <input type="text" id="function2-search" placeholder="例如：寺廟" class="input-search" style="flex:1;">
                </div>
            </div>

            <!-- 風格輸入搜尋 -->
            <div style="margin-bottom:15px;">
                <strong>風格</strong>
                <input type="text" id="style-search" placeholder="例如：禪宗樣、和樣" class="input-search">
            </div>

	    <!-- 外形輸入搜尋（雙條件 + AND/OR） -->
            <div style="margin-bottom:15px;">
                <strong>外形</strong>
                <div style="display:flex; gap:5px; margin-top:8px; align-items:center;">
                    <select id="shape-logic" style="padding:6px; font-size:14px; width:60px;">
                        <option value="AND">AND</option>
                        <option value="OR">OR</option>
                    </select>
                    <select id="shape1-operator" style="padding:6px; font-size:14px; width:85px;">
                        <option value="contains">包含</option>
                        <option value="not_contains">不包含</option>
                    </select>
                    <input type="text" id="shape1-search" placeholder="例如：單檐" class="input-search" style="flex:1;">
                </div>
                <div style="display:flex; gap:5px; margin-top:8px; align-items:center;">
                    <select id="shape2-operator" style="padding:6px; font-size:14px; width:85px;">
                        <option value="contains">包含</option>
                        <option value="not_contains">不包含</option>
                    </select>
                    <input type="text" id="shape2-search" placeholder="例如：歇山" class="input-search" style="flex:1;">
                </div>
            </div>


            <!-- 屋頂類型（輸入搜尋） -->
            <div style="margin-bottom:15px;">
                <strong>屋頂類型</strong>
                <input type="text" id="roof-search" placeholder="例如：歇山、攢尖" class="input-search">
            </div>

            <!-- 檐輸入搜尋（數字篩選） -->
            <div style="margin-bottom:15px;">
                <strong>外檐數</strong>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <select id="eaves-operator" style="padding:6px; font-size:14px;">
                        <option value="=">等於 (=)</option>
                        <option value=">">大於 (>)</option>
                        <option value="<">小於 (<)</option>
                        <option value="-">範圍 (-)</option>
                    </select>
                    <input type="text" id="eaves-search" placeholder="例如：3 或 11" class="input-search" style="flex:1;">
                </div>
            </div>


            <!-- 面寬入搜尋 -->
            <div style="margin-bottom:15px;">
                <strong>面寬</strong>
                <input type="text" id="length-search" placeholder="例如：面三、八角、六椽" class="input-search">
            </div>


            <!-- 開間輸入搜尋（數字篩選） -->
            <div style="margin-bottom:15px;">
                <strong>開間</strong>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <select id="width-operator" style="padding:6px; font-size:14px;">
                        <option value="=">等於 (=)</option>
                        <option value=">">大於 (>)</option>
                        <option value="<">小於 (<)</option>
                        <option value="-">範圍 (-)</option>
                    </select>
                    <input type="text" id="width-search" placeholder="例如：3 或 11" class="input-search" style="flex:1;">
                </div>
            </div>

            <!-- 斗拱輸入搜尋 -->
            <div style="margin-bottom:15px;">
                <strong>斗拱</strong>
                <input type="text" id="dougong-search" placeholder="例如：7鋪作、真昂" class="input-search">
            </div>


            <!-- 斗拱出跳數輸入搜尋（數字篩選） -->
            <div style="margin-bottom:15px;">
                <strong>斗拱出跳數</strong>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <select id="jump-operator" style="padding:6px; font-size:14px;">
                        <option value="=">等於 (=)</option>
                        <option value=">">大於 (>)</option>
                        <option value="<">小於 (<)</option>
                        <option value="-">範圍 (-)</option>
                    </select>
                    <input type="text" id="jump-search" placeholder="例如：3 或 11" class="input-search" style="flex:1;">
                </div>
            </div>

            <!-- 宗教輸入搜尋 -->
            <div style="margin-bottom:15px;">
                <strong>宗教</strong>
                <input type="text" id="religion-search" placeholder="例如：佛教、道教" class="input-search">
            </div>

            <!-- 按鈕群組 -->
            <div class="button-group">
                <button id="reset-btn" onclick="window.resetFilters()">重置（全選）</button>
                <button id="clear-btn" onclick="window.clearAllFilters()">消除所有點選</button>
            </div>
        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/JPLv1_1.js"></script><script src="layers/CNLv2_2.js"></script><script src="layers/CNLv1_3.js"></script><script src="layers/test43_4.js"></script>
        <script src="styles/JPLv1_1_style.js"></script><script src="styles/CNLv2_2_style.js"></script><script src="styles/CNLv1_3_style.js"></script><script src="styles/test43_4_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        

        <!-- 篩選邏輯 -->
        <script>
            window.addEventListener('load', function() {
                // debug: 輸出圖層名稱
                console.log('=== 所有圖層列表 ===');
                map.getLayers().getArray().forEach((layer, index) => {
                    const title = layer.get('title') || layer.get('name') || '無名稱';
                    console.log(`索引 ${index}: title="${title}"`);
                });

                // 找點位圖層
                let pointLayer = null;
                map.getLayers().getArray().forEach(layer => {
                    const title = layer.get('title') || layer.get('name') || '';
                    if (title.includes('test43_4') || title.includes('output') || title.includes('古建築')) {
                        pointLayer = layer;
                        console.log('找到點位圖層：', title);
                    }
                });

                if (!pointLayer) {
                    console.error('找不到點位圖層！');
                    return;
                }

                // 隱藏/開啟篩選面板
                const toggleBtn = document.getElementById('toggle-filter-btn');
                const filterPanel = document.getElementById('filter-panel');
                if (toggleBtn && filterPanel) {
                    toggleBtn.addEventListener('click', function() {
                        if (filterPanel.style.display === 'none') {
                            filterPanel.style.display = 'block';
                            toggleBtn.textContent = '隱藏篩選';
                            toggleBtn.style.background = '#007bff';
                        } else {
                            filterPanel.style.display = 'none';
                            toggleBtn.textContent = '顯示篩選';
                            toggleBtn.style.background = '#28a745';
                        }
                    });
                }

                // 重置（全選）
                window.resetFilters = function() {
                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
                    document.querySelectorAll('.input-search').forEach(input => input.value = '');
                    updateFeatures();
                };

                // 消除所有點選（全取消）
                window.clearAllFilters = function() {
                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                    document.querySelectorAll('.input-search').forEach(input => input.value = '');
                    updateFeatures();
                };


		// 專屬：只消除國家篩選（其他條件不變）
		window.clearCountryFilters = function() {
    			document.querySelectorAll('.filter-country').forEach(cb => cb.checked = false);
    			updateFeatures();
    			console.log('國家篩選已全部取消');
		};


                // 更新顯示
                window.updateFeatures = function() {
                    const source = pointLayer.getSource();
                    if (!source) return;

                    const checkedCountry = Array.from(document.querySelectorAll('.filter-country:checked')).map(cb => cb.value);

                    // === 功能雙條件 + AND/OR ===
                    const funcLogic = document.getElementById('function-logic').value;
                    const func1Op = document.getElementById('function1-operator').value;
                    const func1Keyword = document.getElementById('function1-search')?.value.trim().toLowerCase() || '';
                    const func2Op = document.getElementById('function2-operator').value;
                    const func2Keyword = document.getElementById('function2-search')?.value.trim().toLowerCase() || '';

                    // === 類型雙條件 + AND/OR ===
                    const genreLogic = document.getElementById('genre-logic').value;
                    const genre1Op = document.getElementById('genre1-operator').value;
                    const genre1Keyword = document.getElementById('genre1-search')?.value.trim().toLowerCase() || '';
                    const genre2Op = document.getElementById('genre2-operator').value;
                    const genre2Keyword = document.getElementById('genre2-search')?.value.trim().toLowerCase() || '';


                    // === 外形雙條件 + AND/OR ===
                    const shapeLogic = document.getElementById('shape-logic').value;
                    const shape1Op = document.getElementById('shape1-operator').value;
                    const shape1Keyword = document.getElementById('shape1-search')?.value.trim().toLowerCase() || '';
                    const shape2Op = document.getElementById('shape2-operator').value;
                    const shape2Keyword = document.getElementById('shape2-search')?.value.trim().toLowerCase() || '';

                    const dougongKeyword = document.getElementById('dougong-search')?.value.trim().toLowerCase() || '';
                    const religionKeyword = document.getElementById('religion-search')?.value.trim().toLowerCase() || '';
                    const lengthKeyword = document.getElementById('length-search')?.value.trim().toLowerCase() || '';
                    const nameKeyword = document.getElementById('name-search')?.value.trim().toLowerCase() || '';
                    const addressKeyword = document.getElementById('address-search')?.value.trim().toLowerCase() || '';
                    const regionKeyword = document.getElementById('region-search')?.value.trim().toLowerCase() || '';
                    const styleKeyword = document.getElementById('style-search')?.value.trim().toLowerCase() || '';
                    const periodKeyword = document.getElementById('period-search')?.value.trim().toLowerCase() || '';
                    const roofKeyword = document.getElementById('roof-search')?.value.trim().toLowerCase() || '';

                    source.getFeatures().forEach(feature => {
                        const props = feature.getProperties();

                        const country = props['國家'] || props['excel_國家'] || '其他';
                        const func = (props['功能'] || props['excel_功能'] || '').toLowerCase();
                        const dougong = (props['斗拱'] || props['excel_斗拱'] || '').toLowerCase();
                        const religion = (props['宗教'] || props['excel_宗教'] || '').toLowerCase();
                        const genre = (props['類型'] || props['excel_類型'] || '').toLowerCase();
                        const shape = (props['外形'] || props['excel_外形'] || '').toLowerCase();
                        const length = (props['面寬'] || props['excel_面寬'] || '').toLowerCase();
                        const roof = (props['屋頂類型'] || props['excel_屋頂類型'] || '').toLowerCase();
                        const name = (props['名稱'] || props['excel_名稱'] || '').toLowerCase();
                        const address = (props['地址'] || props['excel_地址'] || '').toLowerCase();
                        const region = (props['地區'] || props['excel_地區'] || '').toLowerCase();
                        const style = (props['風格'] || props['excel_風格'] || '').toLowerCase();
                        const period = (props['時代'] || props['excel_時代'] || '').toLowerCase();

                        const matchCountry = checkedCountry.includes(country);

                        // === 功能雙條件 + AND/OR ===
                        let matchFunction = true;
                        if (func1Keyword || func2Keyword) {
                            const match1 = func1Keyword ? 
                                (func1Op === "not_contains" ? !func.includes(func1Keyword) : func.includes(func1Keyword)) : true;
                            const match2 = func2Keyword ? 
                                (func2Op === "not_contains" ? !func.includes(func2Keyword) : func.includes(func2Keyword)) : true;
                            
                            matchFunction = (funcLogic === "OR") ? (match1 || match2) : (match1 && match2);
                        }


                        // === 類型雙條件 + AND/OR ===
                        let matchGenre = true;
                        if (genre1Keyword || genre2Keyword) {
                            const match1 = genre1Keyword ? 
                                (genre1Op === "not_contains" ? !genre.includes(genre1Keyword) : genre.includes(genre1Keyword)) : true;
                            const match2 = genre2Keyword ? 
                                (genre2Op === "not_contains" ? !genre.includes(genre2Keyword) : genre.includes(genre2Keyword)) : true;
                            
                            matchGenre = (genreLogic === "OR") ? (match1 || match2) : (match1 && match2);
                        }

                        // === 外形雙條件 + AND/OR ===
                        let matchShape = true;
                        if (shape1Keyword || shape2Keyword) {
                            const match1 = shape1Keyword ? 
                                (shape1Op === "not_contains" ? !shape.includes(shape1Keyword) : shape.includes(shape1Keyword)) : true;
                            const match2 = shape2Keyword ? 
                                (shape2Op === "not_contains" ? !shape.includes(shape2Keyword) : shape.includes(shape2Keyword)) : true;
                            
                            matchShape = (shapeLogic === "OR") ? (match1 || match2) : (match1 && match2);
                        }

                        const matchDougong = !dougongKeyword || dougong.includes(dougongKeyword);
                        const matchReligion = !religionKeyword || religion.includes(religionKeyword);
                        const matchLength = !lengthKeyword || length.includes(lengthKeyword);
                        const matchName = !nameKeyword || name.includes(nameKeyword);
                        const matchAddress = !addressKeyword || address.includes(addressKeyword);
                        const matchRegion = !regionKeyword || region.includes(regionKeyword);
                        const matchStyle = !styleKeyword || style.includes(styleKeyword);
                        const matchRoof = !roofKeyword || roof.includes(roofKeyword);
                        const matchPeriod = !periodKeyword || period.includes(periodKeyword);

                        // 世紀篩選
                        const yearOperator = document.getElementById('year-operator').value;
                        const yearInput = document.getElementById('year-search').value.trim();
                        let matchYear = true;
                        if (yearInput) {
                            const yearValueRaw = props['公元'] || props['excel_公元'] || props['年份'] || props['excel_年份'] || '';
                            const yearValue = parseFloat(yearValueRaw);
                            if (!isNaN(yearValue)) {
                                if (yearOperator === '-') {
                                    if (yearInput.includes('-')) {
                                        const [minStr, maxStr] = yearInput.split('-').map(s => s.trim());

                        const show = matchCountry && matchFunction && matchDougong && matchReligion &&
                                     matchGenre && matchShape && matchYear && matchLength &&
                                     matchName && matchAddress && matchRegion && matchStyle && matchPeriod && matchWidth && matchEaves  && matchRoof  && matchJump;

                        feature.setStyle(show ? null : new ol.style.Style({}));
                    });

                    pointLayer.changed();
                };

                // 監聽所有 checkbox 和輸入框
                document.querySelectorAll('input[type="checkbox"], .input-search').forEach(el => {
                    el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', updateFeatures);

                // 初始執行
